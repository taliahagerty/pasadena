<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pasadena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #0d0830 0%, #1a0f5c 50%, #2d1b8a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; }
    .star  { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
    @keyframes twinkle { from { opacity: 0.15; } to { opacity: 1; } }

    h1 {
      color: #ff9de2;
      font-size: 2.5rem;
      margin-bottom: 12px;
      text-shadow: 0 0 20px #ff9de2, 0 0 40px #c77dff;
      animation: titlePulse 1s ease-in-out infinite alternate;
    }
    @keyframes titlePulse {
      from { text-shadow: 0 0 10px #ff9de2, 0 0 20px #c77dff; }
      to   { text-shadow: 0 0 30px #ff9de2, 0 0 60px #c77dff; }
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      width: 620px; height: 300px;
      border-radius: 16px;
      overflow: hidden;
    }

    .sky {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #080520 0%, #1a0f5c 55%, #3525a0 100%);
    }

    .rainbow {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      width: 520px; height: 260px;
      border-radius: 260px 260px 0 0;
      border: 13px solid rgba(255,60,60,0.22);
      box-shadow:
        0 0 0 13px rgba(255,160,0,0.18),
        0 0 0 26px rgba(255,240,0,0.18),
        0 0 0 39px rgba(60,210,60,0.18),
        0 0 0 52px rgba(60,100,255,0.18),
        0 0 0 65px rgba(160,0,220,0.18);
    }

    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: linear-gradient(180deg, #3a8a28, #1a4010);
    }
    .hill { position: absolute; bottom: 48px; border-radius: 50% 50% 0 0; }
    .hill-1 { width: 340px; height: 105px; left: -60px;  background: linear-gradient(180deg, #2d7020, #1a4010); }
    .hill-2 { width: 280px; height:  80px; right: -40px; background: linear-gradient(180deg, #3a8028, #1a4010); }
    .hill-3 { width: 190px; height:  58px; left: 210px;  background: linear-gradient(180deg, #4a9030, #2a5018); }

    /* Floating sparkles */
    .floaters { position: absolute; inset: 0; pointer-events: none; }
    .floater  { position: absolute; font-size: 1.1rem; animation: floatUp 2.5s infinite ease-in; opacity: 0; }
    .floater:nth-child(1) { left: 7%;  animation-delay: 0.0s; color: #ff9de2; }
    .floater:nth-child(2) { left: 90%; animation-delay: 0.9s; color: #ffd700; }
    .floater:nth-child(3) { left: 52%; animation-delay: 1.8s; color: #c77dff; }
    @keyframes floatUp {
      0%   { transform: translateY(270px); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(30px);  opacity: 0; }
    }

    /* ───────── UNICORN ───────── */
    .unicorn-wrap {
      position: absolute;
      bottom: 50px; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 210px;
      animation: gallop 0.35s ease-in-out infinite alternate;
      filter: drop-shadow(0 6px 18px rgba(199,125,255,0.45));
    }
    @keyframes gallop {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-11px); }
    }

    /* Hoof sparks */
    .hoof-sparks .hs {
      position: absolute;
      border-radius: 50%;
      animation: hoofSpark 0.65s ease-out infinite;
    }
    .hs:nth-child(1){ width:7px;height:7px; background:#ff9de2; bottom:0; left:84px;  animation-delay:0.00s; }
    .hs:nth-child(2){ width:5px;height:5px; background:#ffd700; bottom:0; left:106px; animation-delay:0.18s; }
    .hs:nth-child(3){ width:6px;height:6px; background:#c77dff; bottom:0; left:68px;  animation-delay:0.36s; }
    @keyframes hoofSpark {
      0%  { transform: translateY(0) scale(1); opacity: 1; }
      100%{ transform: translateY(-28px) scale(0); opacity: 0; }
    }

    /* Rump (rear hump) */
    .u-rump {
      position: absolute;
      width: 75px; height: 70px;
      background: linear-gradient(150deg, #fef5ff, #ede0ff);
      border-radius: 55% 40% 40% 55% / 55% 50% 40% 50%;
      top: 68px; left: 44px;
      border: 2px solid #dccff2;
    }

    /* Main body */
    .u-body {
      position: absolute;
      width: 158px; height: 80px;
      background: linear-gradient(155deg, #fefaff, #f2eaff);
      border-radius: 52% 48% 46% 54% / 56% 56% 44% 44%;
      top: 72px; left: 55px;
      border: 2px solid #dccff2;
      box-shadow: inset 0 3px 10px rgba(199,125,255,0.1);
    }

    /* Neck */
    .u-neck {
      position: absolute;
      width: 40px; height: 66px;
      background: linear-gradient(160deg, #fefaff, #f2eaff);
      border-radius: 44% 44% 22% 22%;
      top: 27px; left: 186px;
      transform: rotate(-16deg);
      border: 2px solid #dccff2;
    }

    /* Head */
    .u-head {
      position: absolute;
      width: 74px; height: 52px;
      background: linear-gradient(155deg, #fefaff, #f2eaff);
      border-radius: 36% 58% 55% 36% / 50%;
      top: 17px; left: 212px;
      border: 2px solid #dccff2;
    }

    /* Horn */
    .u-horn {
      position: absolute;
      top: -33px; left: 45px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 34px solid #ffd700;
      transform: rotate(20deg);
      transform-origin: bottom center;
      animation: hornGlow 0.9s ease-in-out infinite alternate;
    }
    .u-horn::after {
      content: '';
      position: absolute;
      top: 6px; left: -4px;
      width: 0; height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-bottom: 22px solid #ffe44d;
    }
    @keyframes hornGlow {
      from { filter: drop-shadow(0 0 4px rgba(255,215,0,0.8)); }
      to   { filter: drop-shadow(0 0 14px rgba(255,235,80,1)); }
    }

    /* Eye */
    .u-eye {
      position: absolute;
      width: 14px; height: 14px;
      background: #3a1260;
      border-radius: 50%;
      top: 13px; left: 44px;
      box-shadow: 0 0 5px rgba(199,125,255,0.6);
    }
    .u-eye::after {
      content: '';
      position: absolute;
      width: 5px; height: 5px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
    }

    /* Nostril */
    .u-nostril {
      position: absolute;
      width: 6px; height: 5px;
      background: rgba(200,160,230,0.55);
      border-radius: 50%;
      top: 31px; left: 60px;
    }

    /* Mane — right-aligned in container so strands flow LEFT from neck */
    .u-mane {
      position: absolute;
      top: 18px; left: 126px;
      width: 70px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .mane-s {
      height: 9px;
      border-radius: 5px 1px 1px 5px;
      transform-origin: right center;
      animation: maneFlow 0.35s ease-in-out infinite alternate;
    }
    .mane-s:nth-child(1){ width:42px; background:#ff6eb4; animation-delay:0.00s; }
    .mane-s:nth-child(2){ width:56px; background:#ff9c40; animation-delay:0.05s; }
    .mane-s:nth-child(3){ width:36px; background:#ffd700; animation-delay:0.10s; }
    .mane-s:nth-child(4){ width:62px; background:#7ed321; animation-delay:0.15s; }
    .mane-s:nth-child(5){ width:46px; background:#7eb8f7; animation-delay:0.20s; }
    .mane-s:nth-child(6){ width:52px; background:#c77dff; animation-delay:0.25s; }
    @keyframes maneFlow {
      from { transform: skewY(-2deg) translateX(0);   }
      to   { transform: skewY(-9deg) translateX(-13px); }
    }

    /* Tail — right-aligned in container so strands flow LEFT from body rear */
    .u-tail {
      position: absolute;
      top: 80px; left: 0;
      width: 62px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .tail-s {
      height: 9px;
      border-radius: 5px 1px 1px 5px;
      transform-origin: right center;
      animation: tailFlow 0.35s ease-in-out infinite alternate;
    }
    .tail-s:nth-child(1){ width:44px; background:#c77dff; animation-delay:0.00s; }
    .tail-s:nth-child(2){ width:60px; background:#7eb8f7; animation-delay:0.05s; }
    .tail-s:nth-child(3){ width:38px; background:#7ed321; animation-delay:0.10s; }
    .tail-s:nth-child(4){ width:54px; background:#ffd700; animation-delay:0.15s; }
    .tail-s:nth-child(5){ width:48px; background:#ff9c40; animation-delay:0.20s; }
    .tail-s:nth-child(6){ width:56px; background:#ff6eb4; animation-delay:0.25s; }
    @keyframes tailFlow {
      from { transform: rotate(-6deg)  translateX(0);   }
      to   { transform: rotate(-20deg) translateX(-14px); }
    }

    /* Legs */
    .u-leg {
      position: absolute;
      width: 17px; height: 55px;
      background: linear-gradient(180deg, #f0e8ff, #ddd0f5);
      border-radius: 8px 8px 3px 3px;
      border: 2px solid #dccff2;
      transform-origin: top center;
    }
    .u-leg::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%; transform: translateX(-50%);
      width: 22px; height: 11px;
      background: #b8a0e0;
      border-radius: 4px 4px 7px 7px;
    }
    .leg-bl { top: 144px; left: 80px;  animation: legA 0.35s ease-in-out infinite alternate; }
    .leg-br { top: 144px; left: 100px; animation: legB 0.35s ease-in-out infinite alternate; }
    .leg-fl { top: 144px; left: 167px; animation: legB 0.35s ease-in-out infinite alternate; }
    .leg-fr { top: 144px; left: 187px; animation: legA 0.35s ease-in-out infinite alternate; }
    @keyframes legA { from { transform: rotate(-30deg); } to { transform: rotate(25deg);  } }
    @keyframes legB { from { transform: rotate(25deg);  } to { transform: rotate(-30deg); } }

    /* ── Message & player ── */
    .message {
      color: #ff9de2;
      font-size: 1.1rem;
      margin-top: 18px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #c77dff;
      animation: msgPulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes msgPulse { from { opacity: 0.6; } to { opacity: 1; } }

    .spotify {
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 24px #c77dffaa;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <h1>Pasadena</h1>

  <div class="scene">
    <div class="sky"></div>
    <div class="rainbow"></div>

    <!-- Ground and hills render first (behind unicorn) -->
    <div class="ground"></div>
    <div class="hill hill-1"></div>
    <div class="hill hill-2"></div>
    <div class="hill hill-3"></div>

    <!-- Unicorn -->
    <div class="unicorn-wrap">
      <div class="hoof-sparks">
        <div class="hs"></div><div class="hs"></div><div class="hs"></div>
      </div>

      <!-- Render order matters for z-layering -->
      <div class="u-leg leg-bl"></div>
      <div class="u-leg leg-br"></div>

      <div class="u-tail">
        <div class="tail-s"></div><div class="tail-s"></div><div class="tail-s"></div>
        <div class="tail-s"></div><div class="tail-s"></div><div class="tail-s"></div>
      </div>

      <div class="u-rump"></div>
      <div class="u-body"></div>
      <div class="u-neck"></div>

      <div class="u-mane">
        <div class="mane-s"></div><div class="mane-s"></div><div class="mane-s"></div>
        <div class="mane-s"></div><div class="mane-s"></div><div class="mane-s"></div>
      </div>

      <div class="u-head">
        <div class="u-horn"></div>
        <div class="u-eye"></div>
        <div class="u-nostril"></div>
      </div>

      <div class="u-leg leg-fl"></div>
      <div class="u-leg leg-fr"></div>
    </div>

    <!-- Floaters on top of everything -->
    <div class="floaters">
      <div class="floater">&#9733;</div>
      <div class="floater">&#9829;</div>
      <div class="floater">&#10022;</div>
    </div>
  </div>

  <p class="message">&#10024; Welcome to Pasadena &#10024;</p>
  <iframe class="spotify"
    src="https://open.spotify.com/embed/track/2O99Zlqxzymme2YQVKPpRw?utm_source=generator&theme=0"
    width="340" height="80"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
  </iframe>

  <script>
    const el = document.getElementById('stars');
    for (let i = 0; i < 65; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const z = Math.random() * 3 + 1;
      s.style.cssText = `width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*75}%;animation-delay:${Math.random()*2}s;animation-duration:${1+Math.random()*2}s;`;
      el.appendChild(s);
    }
  </script>

</body>
</html>
